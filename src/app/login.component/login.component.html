<app-navbar></app-navbar>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-logo">Casino</h1>
      <h2 class="auth-title">Dobrodošli nazaj</h2>
      <p class="auth-subtitle">Prijavite se za igro</p>
    </div>
    
    <form class="auth-form" (ngSubmit)="onLogin()">
      <!-- Add error message here -->
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email"
          placeholder="Enter your email"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password"
          placeholder="Enter password"
          required
        >
      </div>

      <button type="submit" class="auth-button">Login</button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register" class="auth-link">Register here</a></p>
    </div>
  </div>
</div>
